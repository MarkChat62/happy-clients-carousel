<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Happy Clients</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Lexend',sans-serif;
  background:#fff;
  overflow-x:hidden;
}

.gallery-header{
  text-align:center;
  padding:25px 15px 20px;
}

.gallery-header h2{
  margin:0;
  color:#C7B495;
  font-size:42px;
  font-weight:700;
}

.gallery-header p{
  margin-top:10px;
  color:#666;
  font-size:18px;
  font-weight:300;
}

.marquee{
  width:100%;
  overflow:hidden;
  position:relative;
}

.track{
  display:flex;
  width:max-content;
  animation:scroll 120s linear infinite;
}

.track:hover{
  animation-play-state:paused;
}

.track img{
  height:320px;
  width:auto;
  margin-right:15px;
  border-radius:12px;
  flex-shrink:0;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.buttons{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:30px 20px 40px;
  flex-wrap:wrap;
}

.btn{
  background:#C7B495;
  color:white;
  text-decoration:none;
  padding:14px 30px;
  border-radius:30px;
  font-weight:600;
  transition:.3s;
}

.btn:hover{
  transform:translateY(-2px);
}

@keyframes scroll{
  from{
    transform:translateX(0);
  }
  to{
    transform:translateX(-50%);
  }
}

@media(max-width:768px){

  .gallery-header h2{
    font-size:30px;
  }

  .gallery-header p{
    font-size:14px;
  }

  .track img{
    height:220px;
  }

  .buttons{
    flex-direction:column;
    align-items:center;
  }

  .btn{
    width:260px;
    text-align:center;
  }
}

</style>
</head>

<body>

<div class="gallery-header">
  <h2>🐾 Happy Clients 🐾</h2>
  <p>Just some of the beautiful dogs we've had the pleasure of grooming.</p>
</div>
